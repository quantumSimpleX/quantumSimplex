<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Primary SEO -->
  <title>Quantum Simplex — AI Transformation Advisory</title>
  <meta name="description" content="Dr. Michael Wu helps organizations understand AI, adopt it well, and navigate the disruption it creates. Three levels of engagement: Inspire, Mobilize, Transform.">
  <meta name="author" content="Dr. Michael Wu">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Quantum Simplex">
  <meta property="og:title" content="Quantum Simplex — AI Transformation Advisory">
  <meta property="og:description" content="Plain words for hard problems. Dr. Michael Wu helps organizations move from AI anxiety to AI action.">
  <!-- <meta property="og:image" content="https://yourdomain.com/og-image.jpg"> -->
  <!-- <meta property="og:url" content="https://yourdomain.com"> -->

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Quantum Simplex — AI Transformation Advisory">
  <meta name="twitter:description" content="Plain words for hard problems. Dr. Michael Wu helps organizations move from AI anxiety to AI action.">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "ProfessionalService",
        "name": "Quantum Simplex",
        "description": "AI transformation advisory. Three levels of engagement: Inspire, Mobilize, Transform.",
        "founder": { "@type": "Person", "@id": "#michael-wu" }
      },
      {
        "@type": "Person",
        "@id": "#michael-wu",
        "name": "Dr. Michael Wu",
        "jobTitle": "AI Transformation Advisor",
        "description": "Former Chief AI Scientist at PROS. Twenty years of research and practice at the intersection of AI, data science, and human behavior.",
        "sameAs": [
          "https://www.linkedin.com/in/michaelwuphd/",
          "https://www.youtube.com/@QuantSimpleX"
        ]
      }
    ]
  }
  </script>

  <link rel="stylesheet" href="site.css">
  <link rel="icon" href="../assets/icon-q-black.svg">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data (plain JS — no Babel needed) -->
  <script src="data.js"></script>

  <!-- Scroll reveal (plain JS — must load before components) -->
  <script src="reveal.js"></script>

  <!-- Components (Babel/JSX) -->
  <script type="text/babel" src="Nav.jsx" data-presets="react"></script>
  <script type="text/babel" src="Footer.jsx" data-presets="react"></script>
  <script type="text/babel" src="HomePage.jsx" data-presets="react"></script>
  <script type="text/babel" src="AboutPage.jsx" data-presets="react"></script>
  <script type="text/babel" src="ServicesPage.jsx" data-presets="react"></script>
  <script type="text/babel" src="ThoughtLeadershipPage.jsx" data-presets="react"></script>
  <script type="text/babel" src="BookPage.jsx" data-presets="react"></script>

  <!-- App shell -->
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    function App() {
      const [page, setPage] = useState('home');
      const [menuOpen, setMenuOpen] = useState(false);

      // Persist page in sessionStorage so refresh doesn't lose context
      useEffect(() => {
        const saved = sessionStorage.getItem('qs-page');
        if (saved) setPage(saved);
      }, []);

      const onNav = (id) => {
        setPage(id);
        setMenuOpen(false);
        sessionStorage.setItem('qs-page', id);
        window.scrollTo({ top: 0, behavior: 'instant' });
      };

      const pages = {
        home:     <HomePage onNav={onNav} />,
        about:    <AboutPage onNav={onNav} />,
        services: <ServicesPage onNav={onNav} />,
        insights: <ThoughtLeadershipPage onNav={onNav} />,
        engage:   <BookPage onNav={onNav} />,
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
          <Nav page={page} onNav={onNav} menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
          <div style={{ flex: 1 }}>
            {pages[page] || pages['home']}
          </div>
          <Footer onNav={onNav} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
